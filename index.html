<script>
        // Micro-interaction: Subtle mouse parallax on the maintenance card (only for desktop)
        if (window.innerWidth > 768) {
            document.addEventListener('mousemove', (e) => {
                const card = document.querySelector('.bg-surface-container-low');
                const rect = card.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width - 0.5;
                const y = (e.clientY - rect.top) / rect.height - 0.5;
                
                card.style.transform = `perspective(1000px) rotateX(${y * 2}deg) rotateY(${x * 2}deg) translateY(${y * 5}px)`;
            });
        }

        // Micro-interaction: Auto-updating UTC time (simulated logic)
        function updateClock() {
            const timeDisplay = document.querySelector('.font-mono.text-primary-fixed');
            const now = new Date();
            // Simple logic to simulate expected back time moving with current time for demo purposes
            if (now.getUTCMinutes() > 55) {
                timeDisplay.textContent = `${(now.getUTCHours() + 1) % 24}:15 UTC`;
            }
        }
        setInterval(updateClock, 30000);
    </script>
